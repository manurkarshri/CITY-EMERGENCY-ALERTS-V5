name: V5 Collect River Status

  on:
    schedule:
  - cron: "0 * * * *"
workflow_dispatch:

  permissions:
    contents: write

  jobs:
    run:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Run task
          run: node scripts/collect-river.js
        - name: Commit generated data
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "V5 Collect River Status"
            file_pattern: |
              data/*.json
