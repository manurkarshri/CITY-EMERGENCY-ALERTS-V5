name: Update Emergency Data

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Emergency Data Collector
        run: node scripts/collector.js

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update emergency data"
          file_pattern: |
            data/live-alerts.json
            data/weather.json
