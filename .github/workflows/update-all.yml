name: V5 Update All Emergency Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run V5 data pipeline
        run: node scripts/run-all.js

      - name: Validate generated JSON
        run: node scripts/validate-data.js

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update V5 emergency data"
          file_pattern: |
            data/*.json
