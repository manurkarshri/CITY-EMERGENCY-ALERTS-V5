name: V5 Update All Emergency Data

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Run complete V5 data pipeline
        run: |
          if [ -f scripts/run-all.js ]; then
            node scripts/run-all.js
          else
            echo "scripts/run-all.js not found."
          fi

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update emergency intelligence"
          file_pattern: |
            data/*.json
